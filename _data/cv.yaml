    publications:
      - title: "RLMuscle: Muscle-Driven Character Animation via Reinforcement Learning"
        authors:
          - "Chunlei Li"
          - "Siyuan Yu"
          - "Yang Gao"
          - "Shuai Li"
          - "Peng Yu"
          - "Aimin Hao"
          - "He Wang"
        date: "Under Review"
        journal: "IEEE Transactions on Visualization and Computer Graphics"
        url: "https://chunleili.github.io/project-page-rlmuscle/"
        summary: "Motivation: in most 3D animation pipelines artists hand-tune per-muscle activations, which is time-consuming and lacks physical realism. Novelty: an RL controller trained on a 1D Hill-type surrogate automatically discovers per-muscle activations, which then drive a GPU multigrid-XPBD volumetric simulator with Hill-type fiber constraints, animating a 194-muscle full-body model at 18 ms per frame."

      - title: "MGPBD: A Multigrid Accelerated Global XPBD Solver"
        authors:
          - "Chunlei Li"
          - "Peng Yu"
          - "Tiantian Liu"
          - "Siyuan Yu"
          - "Yuting Xiao"
          - "Shuai Li"
          - "Aimin Hao"
          - "Yang Gao"
          - "Qinping Zhao"
        date: "2025-08-14"
        journal: "SIGGRAPH"
        doi: "10.1145/3721238.3730720"
        summary: "Motivation: XPBD's Gauss-Seidel solver stalls on low-frequency errors, causing instability in high-resolution, high-stiffness simulations. Novelty: a global UA-AMG preconditioned CG solver with lazy prolongator reuse and lightweight near-kernel construction, greatly improving convergence and stability at low overhead."

      - title: "Parallel Constraint Graph Partitioning and Coloring for Realtime Soft-Body Cutting"
        authors:
            - "Peng Yu"
            - "Ruiqi Wang"
            - "Chunlei Li"
            - "Yuxuan Li"
            - "Xiao Zhai"
            - "Yuanbo He"
            - "Hongyu Wu"
            - "Aimin Hao"
        date: "2025-04-19"
        journal: "Pacific Graphics"
        doi: "10.2312/pg.20251267"
        summary: "Motivation: cutting changes mesh topology on the fly, invalidating the precomputed constraint partitioning and coloring that parallel GPU solvers rely on. Novelty: a parallel constraint-graph re-partitioning and re-coloring scheme that restores solver parallelism instantly, enabling realtime soft-body cutting."

      - title: "A Unified Particle-Based Solver for non-Newtonian Behaviors Simulation"
        authors:
          - "Chunlei Li"
          - "Yang Gao"
          - "Jiayi He"
          - "Tianwei Cheng"
          - "Shuai Li"
          - "Aimin Hao"
        date: "2023-12-01"
        journal: "IEEE Transactions on Visualization and Computer Graphics"
        doi: "10.1109/TVCG.2023.3341453"
        summary: "Motivation: non-Newtonian materials such as mud, dough and slime span fluid-like and solid-like behaviors that single-purpose solvers cannot capture consistently. Novelty: a unified SPH solver whose constitutive model smoothly covers viscous, elastic and plastic regimes, reproducing shear-thinning/thickening and viscoelastic effects in one framework."

      - title: "Comparison between Two Eulerian-Lagrangian Methods: CFD-DEM & MPPIC on the biomass gasification in a fluidized bed"
        authors:
          - "Chunlei Li"
          - "Qitai Eri"
        date: "2021-02-25"
        journal: "Biomass Conversion and Biorefinery"
        doi: "10.1007/s13399-021-01384-2"

      - title: "Comparative Study of Three Modified sCO2 Brayton Recompression Cycles Based on Energy and Exergy Analysis with GA Optimization"
        authors:
          - "Chunlei Li"
          - "Qitai Eri"
        date: "2021-01-15"
