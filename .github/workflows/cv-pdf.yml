name: Build CV PDF

on:
  push:
    paths:
      - "_data/cv.yaml" 
      - ".github/workflows/cv-pdf.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # 使用最新的 Python 3 版本

      - name: Install rendercv
        run: pip install "rendercv[full]==2.3"  # 与本地 .venv-rendercv 版本保持一致，新版 schema 不认 design.entry_types

      - name: Generate PDF
        run: rendercv render _data/cv.yaml

      - name: Move PDF to files folder
        run: cp "_data/rendercv_output/Chunlei_Li_(李春蕾)_CV.pdf" files/cv.pdf

      - name: Move Markdown to files folder
        run: cp "_data/rendercv_output/Chunlei_Li_(李春蕾)_CV.md" files/cv.md

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV-PDF
          path: files/cv.pdf

      - name: check
        run: |
          ls files

      - name: Push PDF to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add files/cv.pdf files/cv.md
          git diff --cached --quiet && exit 0
          git commit -m "Automate CV PDF update"
          git status
          git push
        # with:
        #   token: ${{ secrets.PAT_TOKEN }}
