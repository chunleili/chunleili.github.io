name: Build CV PDF

on:
  push:
    paths:
      - "_data/cv.yaml" 
      - ".github/workflows/cv-pdf.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 与本地 .venv-rendercv 一致；rendercv 2.3 在 3.14 上装不全

      - name: Install rendercv
        run: pip install "rendercv[full]==2.3" "typer==0.25.0" "typst==0.14.8"  # 与本地 .venv-rendercv 一致；新版 rendercv 不认 design.entry_types，typer 0.27 会破坏 2.3 的 CLI

      - name: Generate PDF
        run: rendercv render _data/cv.yaml

      - name: Move PDF to files folder
        run: cp "rendercv_output/Chunlei_Li_(李春蕾)_CV.pdf" files/cv.pdf

      - name: Move Markdown to files folder
        run: cp "rendercv_output/Chunlei_Li_(李春蕾)_CV.md" files/cv.md

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV-PDF
          path: files/cv.pdf

      - name: check
        run: |
          ls files

      - name: Push PDF to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add files/cv.pdf files/cv.md
          git diff --cached --quiet && exit 0
          git commit -m "Automate CV PDF update"
          git status
          git push
        # with:
        #   token: ${{ secrets.PAT_TOKEN }}
